name: Main verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check_1_psscriptanalyzer:
    name: "PSScriptAnalyzer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout
        run: git status --short
  check_2_verify_syntax_parse_check:
    name: "Verify syntax (parse check)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
