name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**.ps1'
      - '**.psd1'
      - '*.bat'
      - 'cfgs/**'
      - 'README.md'
      - 'docs/**'
      - '!docs/archive/**'
      - '!docs/agent/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.ps1'
      - '**.psd1'
      - '*.bat'
      - 'cfgs/**'
      - 'README.md'
      - 'docs/**'
      - '!docs/archive/**'
      - '!docs/agent/**'
      - '.github/workflows/**'
  workflow_dispatch:

# Restrict GITHUB_TOKEN to read-only by default (principle of least privilege).
# Individual jobs can escalate if needed — none in this workflow do.
permissions:
  contents: read

# Prevent CI abuse: cancel redundant runs, limit concurrent PR jobs
concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      # Pinned to actions/checkout v6.0.2 (2026-01-09) full SHA.
      # Prevents supply-chain attacks via compromised action tags.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache PSScriptAnalyzer module
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Documents/PowerShell/Modules/PSScriptAnalyzer
          key: psscriptanalyzer-2-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml') }}

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: .\.github\scripts\run-psscriptanalyzer.ps1

  syntax-check:
    name: Verify syntax (parse check)
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify syntax (parse check)
        shell: pwsh
        run: .\.github\scripts\verify-syntax.ps1

  windows-powershell-compat:
    name: Windows PowerShell 5.1 compatibility
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Smoke-test shipped entry scripts in Windows PowerShell
        shell: powershell
        run: .\.github\scripts\smoke-entrypoints.ps1 -Engine powershell

  pester:
    name: Pester tests
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Pester module
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Documents/PowerShell/Modules/Pester
          key: pester5-2-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml') }}

      - name: Install Pester 5.x
        shell: pwsh
        run: .\.github\scripts\install-pester.ps1

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = "./tests"
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = "Detailed"
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputFormat = "NUnitXml"
          $cfg.TestResult.OutputPath = "./test-results.xml"
          Invoke-Pester -Configuration $cfg

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pester-test-results
          path: ./test-results.xml
          retention-days: 14

  estimate-keys:
    name: EstimateKey cross-reference
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify EstimateKey references are retired
        shell: bash
        run: |
          if grep -rEn --include='*.ps1' --include='*.psd1' --include='*.yml' --include='*.yaml' --include='*.md' \
            'EstimateKey|CFG_ImprovementEstimates' . |
            grep -v 'CHANGELOG.md' |
            grep -v '.github/workflows/lint.yml' |
            grep -Ev '(^|/)(docs/archive|docs/agent|vendor|third_party|third-party|3rdparty|external)/'; then
            echo "::error::Retired EstimateKey references remain"
            exit 1
          fi
          echo "EstimateKey cross-reference: retired surface is clean"

  e2e:
    name: E2E process smoke
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Pester module
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Documents/PowerShell/Modules/Pester
          key: pester5-2-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml') }}

      - name: Install Pester 5.x
        shell: pwsh
        run: .\.github\scripts\install-pester.ps1

      - name: Run E2E process tests
        shell: pwsh
        run: Invoke-Pester -Path ./tests/e2e -CI

  entrypoint-smoke:
    name: Entry point smoke tests
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Smoke-test shipped entry scripts
        shell: pwsh
        run: .\.github\scripts\smoke-entrypoints.ps1 -Engine pwsh

      - name: Verify launcher contracts
        shell: pwsh
        run: .\.github\scripts\verify-launcher-contracts.ps1
