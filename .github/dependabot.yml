# Keep GitHub Actions pinned SHAs up to date.
# Dependabot will open PRs when new versions are released,
# so we can review and update our pinned hashes.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Group all action updates into a single PR to reduce noise
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
