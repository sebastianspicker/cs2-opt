// net_bad.cfg — CS2 Optimize Suite
// Everything wrong at once: high ping + jitter + packet loss.
//
// Connection profile: 60ms+ ping AND unstable (jitter, loss, or both)
// Examples: satellite internet (Starlink in poor conditions, HughesNet),
//           mobile roaming (international SIM), tethering with weak signal,
//           hotel/hostel Wi-Fi, severely congested ISP during peak hours
//
// HOW TO USE:  exec net_bad  (in CS2 console)
//              Reset when back on a stable connection: exec net_stable
//
// WHAT THIS DOES:
//   This is the tension case: unstable connections want a deep buffer
//   (cl_net_buffer_ticks "4" from net_unstable), but high ping means you're
//   already paying a large latency cost and adding 31ms on top makes it worse.
//   cl_net_buffer_ticks "3" (~23ms) is the compromise — enough to absorb
//   typical jitter bursts without making an already-bad ping unbearable.
//
//   cl_interp_ratio "2" handles loss, same as all non-stable configs.
//   cl_timeout "60" is important here — high-ping unstable routes produce
//   occasional multi-second connectivity gaps that would otherwise disconnect.
//
//   At this connection quality, no CVar configuration produces competitive
//   gameplay. These settings make the experience as consistent as possible
//   given the constraint. Fix the network layer if possible.
//
// LATENCY COST: +23ms above baseline (on top of your already-high base ping)

cl_interp_ratio "2"
cl_interp "0"
cl_net_buffer_ticks "3"
cl_net_buffer_ticks_use_interp "1"
cl_tickpacket_desired_queuelength "2"
cl_timeout "60"
net_client_steamdatagram_enable_override "1"

echo "[CS2-OPT] net_bad — high ping + unstable (+23ms buffer, survival mode)"
