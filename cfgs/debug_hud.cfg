// debug_hud.cfg - CS2 Optimize Suite
// Optional diagnostic telemetry overlay and console snapshot.
//
// HOW TO USE: exec debug_hud
// REVERT:     exec debug_hud_off
//
// Use while diagnosing stutter, packet loss, jitter, routing, or command timing.
// Disable after diagnosis so normal play stays uncluttered.

cl_hud_telemetry_frametime_show "2"
cl_hud_telemetry_frametime_poor "8.0"
cl_hud_telemetry_ping_show "2"
cl_hud_telemetry_ping_poor "60.0"
cl_hud_telemetry_net_misdelivery_show "2"
cl_hud_telemetry_net_misdelivery_poor "1.0"
cl_hud_telemetry_net_quality_graph_show "2"
cl_hud_telemetry_serverrecvmargin_graph_show "2"
cl_hud_telemetry_net_detailed "2"

net_print_sdr_ping_times
net_status
cl_ticktiming print detail

echo "[CS2-OPT] debug_hud - telemetry enabled; console diagnostics printed"
