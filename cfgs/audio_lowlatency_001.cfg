// audio_lowlatency_001.cfg - CS2 Optimize Suite
// Aggressive experimental audio buffer. Benchmark and listen before keeping it.
//
// HOW TO USE: exec audio_lowlatency_001
// REVERT:     exec audio_stable
//
// This can be unstable on many systems. Watch for crackle, dropouts, delayed
// sounds, missing cues, or audio/game desync during a full match. If any appear,
// revert immediately.

snd_autodetect_latency "1"
snd_mixahead "0.001"

echo "[CS2-OPT] audio_lowlatency_001 - aggressive experimental mixahead 0.001"
