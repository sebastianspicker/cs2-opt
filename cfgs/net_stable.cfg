// net_stable.cfg — CS2 Optimize Suite
// Optimal settings. Use this on a stable wired or fiber connection.
// Also use this to reset after switching back from a bad-connection server.
//
// Connection profile: low ping (<40ms), <1% loss, <5ms jitter
// Examples: wired ethernet, home fiber/cable, LAN
//
// HOW TO USE:  exec net_stable  (in CS2 console)
//
// LATENCY COST: none — lowest possible configuration

cl_interp_ratio "1"
cl_interp "0"
cl_net_buffer_ticks "0"
cl_net_buffer_ticks_use_interp "1"
cl_tickpacket_desired_queuelength "0"
cl_timeout "30"
net_client_steamdatagram_enable_override "1"

echo "[CS2-OPT] net_stable — optimal (no added latency)"
