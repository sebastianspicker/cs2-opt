// audio_lowlatency_025.cfg - CS2 Optimize Suite
// Experimental lower audio buffer. Benchmark and listen before keeping it.
//
// HOW TO USE: exec audio_lowlatency_025
// REVERT:     exec audio_stable
//
// Watch for crackle, dropouts, delayed sounds, missing cues, or audio/game
// desync during a full match. If any appear, revert immediately.

snd_autodetect_latency "1"
snd_mixahead "0.025"

echo "[CS2-OPT] audio_lowlatency_025 - experimental mixahead 0.025"
