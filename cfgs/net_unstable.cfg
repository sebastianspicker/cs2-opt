// net_unstable.cfg — CS2 Optimize Suite
// Jitter and/or packet loss on a connection with acceptable base ping.
//
// Connection profile: ping <60ms but erratic — high jitter (±20ms+), packet loss,
//                     or both simultaneously
// Examples: Wi-Fi with interference, 4G hotspot with decent signal,
//           congested home network (streaming/downloads running), ISP peering issues
//
// HOW TO USE:  exec net_unstable  (in CS2 console)
//              Reset when back on a stable connection: exec net_stable
//
// WHAT THIS DOES:
//   cl_interp_ratio "2" covers dropped packets — the client interpolates across
//   a 15.6ms window instead of 7.8ms, making single dropped packets invisible.
//
//   cl_net_buffer_ticks "4" absorbs jitter — holds 4 ticks (~31ms at 128-tick)
//   in a receive buffer and drains them at a steady rate. Packet delivery variance
//   up to ~31ms is absorbed before it reaches the renderer. Without this, jitter
//   shows as micro-stutters and positional inconsistency even at low average ping.
//
//   Both settings are active because jitter and loss frequently co-occur and
//   address different failure modes: the buffer absorbs delivery variance,
//   the interp ratio covers outright gaps from dropped packets.
//
// IF YOU ALSO HAVE high base ping:  use net_bad instead (smaller buffer)
//
// LATENCY COST: +31ms above baseline

cl_interp_ratio "2"
cl_interp "0"
cl_net_buffer_ticks "4"
cl_net_buffer_ticks_use_interp "1"
cl_tickpacket_desired_queuelength "2"
cl_timeout "60"
net_client_steamdatagram_enable_override "1"

echo "[CS2-OPT] net_unstable — jitter + loss (+31ms buffer)"
