// net_highping.cfg — CS2 Optimize Suite
// High base latency, but the route itself is stable (consistent ping, low jitter).
//
// Connection profile: 60ms+ ping, stable routing, low jitter, low loss
// Examples: connecting to a server in another region, Starlink with clear sky,
//           ISP with inefficient routing but consistent behavior
//
// HOW TO USE:  exec net_highping  (in CS2 console)
//
// WHAT THIS DOES:
//   Your base ping already costs you latency — these settings minimize the
//   CVar-side additions. cl_interp_ratio "2" is kept because high-ping routes
//   commonly have mild loss even when they appear "stable".
//   cl_net_buffer_ticks "2" adds only ~16ms of buffer — enough for occasional
//   brief variance without significantly worsening your already-high ping.
//   cl_timeout "60" prevents disconnects during momentary routing spikes.
//
// IF YOU HAVE high ping + jitter or loss:  use net_bad instead
//
// LATENCY COST: +16ms above baseline

cl_interp_ratio "2"
cl_interp "0"
cl_net_buffer_ticks "2"
cl_net_buffer_ticks_use_interp "1"
cl_tickpacket_desired_queuelength "1"
cl_timeout "60"
net_client_steamdatagram_enable_override "1"

echo "[CS2-OPT] net_highping — high ping, stable route (+16ms buffer)"
