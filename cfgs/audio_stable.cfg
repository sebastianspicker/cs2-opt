// audio_stable.cfg - CS2 Optimize Suite
// Stable audio baseline. Use this to reset after low-latency experiments.
//
// HOW TO USE: exec audio_stable
//
// This is the suite default: automatic latency detection on, with a
// stability-oriented mixahead buffer. If audio_lowlatency_025 or
// audio_lowlatency_001 causes crackle, dropouts, or audio/game desync,
// revert with: exec audio_stable

snd_autodetect_latency "1"
snd_mixahead "0.05"

echo "[CS2-OPT] audio_stable - stable audio baseline (mixahead 0.05)"
